[pytest]
# Configuração do Pytest

# Diretórios de teste
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py

# Padrão de classes de teste
python_classes = Test*

# Padrão de funções de teste
python_functions = test_*

# Opções padrão
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-config=pytest.ini

# Markers customizados
markers =
    unit: Testes unitários
    integration: Testes de integração
    slow: Testes lentos
    vertex: Testes do Vertex AI
    firestore: Testes do Firestore
    real: Testes com dados reais (requer credenciais)

# Cobertura
[coverage:run]
source = src
omit = 
    */tests/*
    */__pycache__/*
    */venv/*
    */env/*
    src/repositories/*
    src/services/ai_inference.py
    src/services/ai_inference_gemini.py
    src/services/ai_inference_vertex.py
    src/config/*
    src/factory.py
    src/pipelines/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
